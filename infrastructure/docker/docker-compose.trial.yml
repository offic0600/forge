services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  backend:
    build:
      context: ../../web-ide/backend
      dockerfile: Dockerfile
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FORGE_SECURITY_ENABLED: ${FORGE_SECURITY_ENABLED:-false}
      FORGE_CORS_ALLOWED_ORIGINS: "http://localhost:9000"
      FORGE_FRONTEND_URL: "http://localhost:9000"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FORGE_PLUGINS_PATH: /plugins
      OAUTH2_ISSUER_URI: http://keycloak:8080/realms/forge
      OAUTH2_CLIENT_ID: forge-web-ide
    volumes:
      - ../../plugins:/plugins:ro
      - ../../knowledge-base:/knowledge-base:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/knowledge/search"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      keycloak:
        condition: service_healthy

  frontend:
    build:
      context: ../../web-ide/frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8080
      BACKEND_WS_URL: ws://backend:8080
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8180
      NEXT_PUBLIC_KEYCLOAK_REALM: forge
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: forge-web-ide
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "9000:9000"
    volumes:
      - ./nginx-trial.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
